spring.application.name=APIGateWay1
server.port=8082


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url = jdbc:mysql://localhost:3306/Api
spring.datasource.username =root
spring.datasource.password =9730


#this line if kept true will print the LOgs in my console.
spring.jpa.show-sql =true


#if I change the code that is class here,alter the table.
spring.jpa.hibernate.ddl-auto =update

#version
spring.jpa.properties.hibernate.dialect =org.hibernate.dialect.MySQLDialect
# Address Service Route
spring.cloud.gateway.routes[0].id=Address-service
spring.cloud.gateway.routes[0].uri=http://localhost:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/address/**

# User Order Service Route
spring.cloud.gateway.routes[1].id=UserOrder-service
spring.cloud.gateway.routes[1].uri=http://localhost:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/Order/**
